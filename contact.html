<h2 class="text-success">Contact Us</h2>

<p>Have questions or suggestions? Reach out to us!</p>

  <form class="mt-3" action="https://formspree.io/f/mlgpyqdv" method="POST" onsubmit="handleSubmit(event)"></form>

  <input type="text" name="name" class="form-control mt-2" placeholder="Your Name" required>

  <input type="email" name="email" class="form-control mt-2" placeholder="Your Email" required>

  <textarea name="message" class="form-control mt-2" rows="4" placeholder="Your Message"></textarea>

  <button type="submit" class="btn btn-success mt-3">Submit</button>

  <p id="successMsg" class="text-success mt-3"></p>
